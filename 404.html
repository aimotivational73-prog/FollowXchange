<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | FollowXchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --ig-gradient: linear-gradient(135deg, #E1306C, #833AB4, #F77737);
            --bg-color: #f8f9fa;
            --text-dark: #2d3436;
            --text-muted: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-icon {
            font-size: 6rem;
            background: var(--ig-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            max-width: 400px;
        }

        .btn-home {
            background: var(--ig-gradient);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(225, 48, 108, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(225, 48, 108, 0.4);
        }
    </style>
</head>
<body>

    <i class="fa-solid fa-face-frown-open error-icon"></i>
    <h1>404</h1>
    <p>Oops! The page you are looking for doesn't exist or has been moved.</p>
    
    <a href="dashboard.html" class="btn-home">
        <i class="fa-solid fa-arrow-left"></i> Go to Dashboard
    </a>

</body>
</html>
